    <form action="/chess" method="post" enctype="application/x-www-form-urlencoded">
        <label>your move:</label>
        <input type="text"  id="moveInput" name="move"/><br><br> <!-- Changed id to moveInput -->
        <input type="submit" value="Submit" />
        <input type="hidden" id="gameId" name="gameId" th:value="${gameId}">
    </form>
    <p th:text="${pcMove}"></p>
    <p th:text="${answer}"></p>

    <script>
        let selectedPieceSquare = null; // Stores algebraic notation like "E2"
        let highlightedSquares = []; // Stores algebraic notations of highlighted squares
        const gameId = document.getElementById('gameId').value;
        const turnIndicator = document.getElementById('turnIndicator');
        const boardCells = document.querySelectorAll('td[data-square]');
        const moveInput = document.getElementById('moveInput');
        const chessForm = document.querySelector('form[action="/chess"]');

        function clearHighlights() {
            highlightedSquares.forEach(squareNotation => {
                const cell = document.querySelector(`td[data-square="${squareNotation}"]`);
                if (cell) {
                    cell.classList.remove('valid-move');
                }
            });
            highlightedSquares = [];
        }

        function clearSelectedPieceStyle() {
            const currentlySelected = document.querySelector('.selected-piece');
            if (currentlySelected) {
                currentlySelected.classList.remove('selected-piece');
            }
        }

        function applySelectedPieceStyle(squareElement) {
            if (squareElement) {
                squareElement.classList.add('selected-piece');
            }
        }

        function getPieceImageSrc(squareElement) {
            if (!squareElement) return null;
            const imgElement = squareElement.querySelector('img');
            return imgElement ? imgElement.getAttribute('src') : null;
        }

        function isMyPiece(pieceImageSrc) {
            if (!pieceImageSrc) return false;
            const turnText = turnIndicator.textContent;
            const isWhiteTurn = turnText.includes('WHITE');
            const isWhitePiece = pieceImageSrc.includes('white');
            const isBlackPiece = pieceImageSrc.includes('black');
            return (isWhiteTurn && isWhitePiece) || (!isWhiteTurn && isBlackPiece);
        }

        function fetchAndHighlightValidMoves(algebraicPosition) {
            clearHighlights(); // Clear previous highlights before fetching new ones
            fetch(`/validMoves?piecePosition=${algebraicPosition}&gameId=${gameId}`)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok: ' + response.statusText);
                    }
                    return response.json();
                })
                .then(validMoves => {
                    validMoves.forEach(moveSquare => {
                        const targetCell = document.querySelector(`td[data-square="${moveSquare}"]`);
                        if (targetCell) {
                            targetCell.classList.add('valid-move');
                            highlightedSquares.push(moveSquare); // Keep track of highlighted squares by notation
                        }
                    });
                })
                .catch(error => {
                    console.error(`Error fetching valid moves for ${algebraicPosition}:`, error);
                    selectedPieceSquare = null; // Deselect if fetch fails
                    clearSelectedPieceStyle();
                });
        }

        boardCells.forEach(cell => {
            cell.addEventListener('click', function(event) {
                const clickedSquareElement = event.currentTarget;
                const clickedSquareAlgebraic = clickedSquareElement.dataset.square;

                if (selectedPieceSquare) { // A piece is already selected
                    if (clickedSquareElement.classList.contains('valid-move')) {
                        // **EXECUTE MOVE**
                        const moveString = `${selectedPieceSquare}-${clickedSquareAlgebraic}`;
                        moveInput.value = moveString;
                        chessForm.submit();
                        // Page reloads, so no need to clear state here, but good practice for AJAX:
                        // clearHighlights();
                        // clearSelectedPieceStyle();
                        // selectedPieceSquare = null;
                    } else {
                        // Clicked a non-valid square. Is it another of my pieces?
                        const pieceImageSrc = getPieceImageSrc(clickedSquareElement);
                        
                        clearHighlights(); // Always clear old highlights
                        clearSelectedPieceStyle(); // Clear style from previously selected piece

                        if (isMyPiece(pieceImageSrc)) {
                            // **SWITCH SELECTION to this new piece**
                            selectedPieceSquare = clickedSquareAlgebraic;
                            applySelectedPieceStyle(clickedSquareElement);
                            fetchAndHighlightValidMoves(selectedPieceSquare);
                        } else {
                            // Clicked an opponent's piece or empty square (not a valid move for current selection)
                            selectedPieceSquare = null; // Deselect
                        }
                    }
                } else { // No piece is currently selected
                    // **ATTEMPT TO SELECT A PIECE**
                    const pieceImageSrc = getPieceImageSrc(clickedSquareElement);
                    if (isMyPiece(pieceImageSrc)) {
                        clearSelectedPieceStyle(); // Clear if any residual style (should not happen)
                        selectedPieceSquare = clickedSquareAlgebraic;
                        applySelectedPieceStyle(clickedSquareElement);
                        fetchAndHighlightValidMoves(selectedPieceSquare);
                    }
                    // Else, clicked opponent piece or empty square, do nothing.
                }
            });
        });
    </script>
